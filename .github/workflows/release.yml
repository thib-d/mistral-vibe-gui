name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install rsvg-convert
        run: brew install librsvg

      - name: Generate .icns
        run: |
          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512 1024; do
            rsvg-convert -w $size -h $size icon.svg -o AppIcon.iconset/icon_${size}x${size}.png
          done
          cp AppIcon.iconset/icon_32x32.png   AppIcon.iconset/icon_16x16@2x.png
          cp AppIcon.iconset/icon_64x64.png   AppIcon.iconset/icon_32x32@2x.png
          cp AppIcon.iconset/icon_256x256.png AppIcon.iconset/icon_128x128@2x.png
          cp AppIcon.iconset/icon_512x512.png AppIcon.iconset/icon_256x256@2x.png
          cp AppIcon.iconset/icon_1024x1024.png AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o AppIcon.icns

      - name: Build binary
        run: go build -o "Mistral-Vibe-GUI.app/Contents/MacOS/mistral-vibe" .

      - name: Bundle .app and create .dmg
        run: |
          mkdir -p "Mistral-Vibe-GUI.app/Contents/Resources"
          cp AppIcon.icns "Mistral-Vibe-GUI.app/Contents/Resources/AppIcon.icns"
          cat > "Mistral-Vibe-GUI.app/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>             <string>Mistral-Vibe-GUI</string>
            <key>CFBundleDisplayName</key>      <string>Mistral-Vibe-GUI</string>
            <key>CFBundleIdentifier</key>       <string>com.thib-d.mistral-vibe</string>
            <key>CFBundleVersion</key>          <string>${{ github.ref_name }}</string>
            <key>CFBundleShortVersionString</key><string>${{ github.ref_name }}</string>
            <key>CFBundleExecutable</key>       <string>mistral-vibe</string>
            <key>CFBundleIconFile</key>         <string>AppIcon</string>
            <key>CFBundlePackageType</key>      <string>APPL</string>
            <key>NSHighResolutionCapable</key>  <true/>
            <key>LSMinimumSystemVersion</key>   <string>10.13</string>
          </dict>
          </plist>
          EOF
          codesign --deep --force --sign - "Mistral-Vibe-GUI.app"
          mkdir dmg-staging
          cp -r "Mistral-Vibe-GUI.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Mistral Vibe" -srcfolder dmg-staging -ov -format UDZO ${{ github.ref_name }}-mac-arm64.dmg
          rm -rf dmg-staging

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: ${{ github.ref_name }}-mac-arm64.dmg

  build-mac-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install rsvg-convert
        run: brew install librsvg

      - name: Generate .icns
        run: |
          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512 1024; do
            rsvg-convert -w $size -h $size icon.svg -o AppIcon.iconset/icon_${size}x${size}.png
          done
          cp AppIcon.iconset/icon_32x32.png   AppIcon.iconset/icon_16x16@2x.png
          cp AppIcon.iconset/icon_64x64.png   AppIcon.iconset/icon_32x32@2x.png
          cp AppIcon.iconset/icon_256x256.png AppIcon.iconset/icon_128x128@2x.png
          cp AppIcon.iconset/icon_512x512.png AppIcon.iconset/icon_256x256@2x.png
          cp AppIcon.iconset/icon_1024x1024.png AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o AppIcon.icns

      - name: Build binary
        run: go build -o "Mistral-Vibe-GUI.app/Contents/MacOS/mistral-vibe" .

      - name: Bundle .app and create .dmg
        run: |
          mkdir -p "Mistral-Vibe-GUI.app/Contents/Resources"
          cp AppIcon.icns "Mistral-Vibe-GUI.app/Contents/Resources/AppIcon.icns"
          cat > "Mistral-Vibe-GUI.app/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>             <string>Mistral-Vibe-GUI</string>
            <key>CFBundleDisplayName</key>      <string>Mistral-Vibe-GUI</string>
            <key>CFBundleIdentifier</key>       <string>com.thib-d.mistral-vibe</string>
            <key>CFBundleVersion</key>          <string>${{ github.ref_name }}</string>
            <key>CFBundleShortVersionString</key><string>${{ github.ref_name }}</string>
            <key>CFBundleExecutable</key>       <string>mistral-vibe</string>
            <key>CFBundleIconFile</key>         <string>AppIcon</string>
            <key>CFBundlePackageType</key>      <string>APPL</string>
            <key>NSHighResolutionCapable</key>  <true/>
            <key>LSMinimumSystemVersion</key>   <string>10.13</string>
          </dict>
          </plist>
          EOF
          codesign --deep --force --sign - "Mistral-Vibe-GUI.app"
          mkdir dmg-staging
          cp -r "Mistral-Vibe-GUI.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Mistral Vibe" -srcfolder dmg-staging -ov -format UDZO ${{ github.ref_name }}-mac-intel.dmg
          rm -rf dmg-staging

      - uses: actions/upload-artifact@v4
        with:
          name: mac-intel
          path: ${{ github.ref_name }}-mac-intel.dmg

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.0-dev
      - run: go build -o ${{ github.ref_name }}-linux .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ${{ github.ref_name }}-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build -o ${{ github.ref_name }}-windows.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ${{ github.ref_name }}-windows.exe

  release:
    needs: [build-mac-arm64, build-mac-intel, build-linux, build-windows]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            ${{ github.ref_name }}-mac-arm64.dmg
            ${{ github.ref_name }}-mac-intel.dmg
            ${{ github.ref_name }}-linux
            ${{ github.ref_name }}-windows.exe
