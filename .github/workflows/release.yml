name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build -o mistral-vibe-mac-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: mistral-vibe-mac-arm64

  build-mac-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build -o mistral-vibe-mac-intel .
      - uses: actions/upload-artifact@v4
        with:
          name: mac-intel
          path: mistral-vibe-mac-intel

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: sudo apt-get install -y libwebkit2gtk-4.0-dev
      - run: go build -o mistral-vibe-linux .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: mistral-vibe-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build -o mistral-vibe-windows.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: mistral-vibe-windows.exe

  release:
    needs: [build-mac-arm64, build-mac-intel, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            mistral-vibe-mac-arm64
            mistral-vibe-mac-intel
            mistral-vibe-linux
            mistral-vibe-windows.exe
